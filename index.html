<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PyroScroll — School Announcements</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #0f1923;
      --bg2: #152030;
      --accent: #e8c27a;
      --accent2: #6dd5c4;
      --glass-bg: rgba(255,255,255,0.045);
      --glass-border: rgba(255,255,255,0.10);
      --glass-hover: rgba(255,255,255,0.07);
      --text: #eef0f3;
      --text-dim: rgba(238,240,243,0.5);
      --radius: 18px;
      --shadow: 0 8px 40px rgba(0,0,0,0.35);
      --tag-blue: rgba(100,180,255,0.15);
      --tag-green: rgba(100,220,160,0.15);
      --tag-red: rgba(255,120,120,0.15);
      --tag-yellow: rgba(240,200,80,0.15);
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg1);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb1 { width: 520px; height: 520px; background: #1a5c8a; top: -120px; left: -120px; animation-duration: 20s; }
    .orb2 { width: 400px; height: 400px; background: #1e7a6a; bottom: -80px; right: -80px; animation-duration: 24s; animation-delay: -6s; }
    .orb3 { width: 300px; height: 300px; background: #7a5c1e; top: 40%; left: 55%; animation-duration: 16s; animation-delay: -3s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* ── LAYOUT ── */
    .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 36px;
      background: rgba(15,25,35,0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .logo-text span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 14px; }

    /* ── GOOGLE LOGIN BTN ── */
    .btn-google {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-decoration: none;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    .btn-google svg { flex-shrink: 0; }

    .user-chip {
      display: none;
      align-items: center; gap: 10px;
      padding: 6px 14px 6px 6px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      font-size: 0.85rem;
    }
    .user-chip img {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--glass-border);
    }
    .user-chip.visible { display: flex; }

    .btn-signout {
      padding: 7px 14px;
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 50px;
      color: #ff8080;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-signout:hover { background: rgba(255,80,80,0.2); }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 400;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .page-sub {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    /* ── POST FORM ── */
    .post-form-wrap {
      margin-bottom: 36px;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .post-form-wrap.visible { display: block; }

    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 11px 14px;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--accent);
      background: rgba(232,194,122,0.05);
    }
    .form-textarea { resize: vertical; min-height: 90px; }
    .form-select option { background: #1a2a38; color: var(--text); }

    .form-row { display: flex; gap: 14px; margin-bottom: 16px; }
    .form-row > * { flex: 1; }
    .form-group { margin-bottom: 16px; }

    .btn-post {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--accent), #d4a840);
      border: none; border-radius: 50px;
      color: #1a1000;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-post:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-post:active { transform: translateY(0); }

    /* ── TOGGLE POST BTN ── */
    .btn-new-post {
      display: none;
      align-items: center; gap: 8px;
      padding: 10px 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 28px;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(12px);
    }
    .btn-new-post.visible { display: flex; }
    .btn-new-post:hover { background: var(--glass-hover); transform: translateY(-1px); }

    /* ── FILTERS ── */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-btn {
      padding: 6px 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: var(--text-dim);
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(232,194,122,0.12);
      border-color: rgba(232,194,122,0.4);
      color: var(--accent);
    }

    /* ── ANNOUNCEMENT CARDS ── */
    .announcements { display: flex; flex-direction: column; gap: 16px; }

    .ann-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 22px 26px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.35s ease both;
      position: relative;
      overflow: hidden;
    }
    .ann-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .ann-card[data-cat="general"]::before   { background: #6db3ff; }
    .ann-card[data-cat="event"]::before     { background: var(--accent2); }
    .ann-card[data-cat="urgent"]::before    { background: #ff7b7b; }
    .ann-card[data-cat="academic"]::before  { background: var(--accent); }

    .ann-card:hover {
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .ann-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .ann-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      flex: 1;
    }
    .ann-tag {
      padding: 3px 11px;
      border-radius: 50px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .tag-general  { background: var(--tag-blue);   color: #7bc8ff; border: 1px solid rgba(100,180,255,0.25); }
    .tag-event    { background: var(--tag-green);  color: #6addb4; border: 1px solid rgba(100,220,160,0.25); }
    .tag-urgent   { background: var(--tag-red);    color: #ff9090; border: 1px solid rgba(255,120,120,0.25); }
    .tag-academic { background: var(--tag-yellow); color: #f0c84a; border: 1px solid rgba(240,200,80,0.25); }

    .ann-body {
      font-size: 0.92rem;
      color: rgba(238,240,243,0.78);
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .ann-meta {
      display: flex; align-items: center; gap: 14px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .ann-meta-author { display: flex; align-items: center; gap: 6px; }
    .ann-meta-author img {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid var(--glass-border);
    }
    .ann-delete {
      margin-left: auto;
      background: none; border: none;
      color: var(--text-dim);
      cursor: pointer; font-size: 0.78rem;
      transition: color 0.2s;
      padding: 2px 6px; border-radius: 6px;
    }
    .ann-delete:hover { color: #ff8080; background: rgba(255,80,80,0.08); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state .es-icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.4; }
    .empty-state p { font-size: 0.95rem; }

    /* ── LOGIN PROMPT ── */
    .login-prompt {
      background: rgba(232,194,122,0.07);
      border: 1px solid rgba(232,194,122,0.2);
      border-radius: var(--radius);
      padding: 22px 26px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin-bottom: 36px;
      backdrop-filter: blur(12px);
    }
    .lp-text { font-size: 0.9rem; color: var(--text-dim); }
    .lp-text strong { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,50,60,0.9);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 0.88rem;
      color: var(--text);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      header { padding: 14px 18px; }
      main { padding: 28px 16px 48px; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">📌</div>
      <span class="logo-text">Pyro<span>Scroll</span></span>
    </div>
    <div class="header-right">
      <div class="user-chip" id="userChip">
        <img id="userAvatar" src="" alt=""/>
        <span id="userName"></span>
      </div>
      <button class="btn-signout" id="btnSignOut" style="display:none" onclick="signOut()">Sign out</button>
      <button class="btn-google" id="btnLogin" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2045c0-.638-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9086c1.7018-1.5668 2.6836-3.874 2.6836-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.4673-.8059 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.8591-3.0477.8591-2.3445 0-4.3282-1.5836-5.036-3.7105H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71C3.7845 10.17 3.6818 9.5945 3.6818 9s.1027-1.17.2822-1.71V4.9582H.9573A8.9961 8.9961 0 000 9c0 1.4523.3477 2.8268.9573 4.0418L3.964 10.71z" fill="#FBBC05"/>
          <path d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4627.8918 11.4259 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9582L3.964 7.29C4.6718 5.1632 6.6555 3.5795 9 3.5795z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <h1 class="page-title">Announcement Board</h1>
    <p class="page-sub" id="pageSubText">Stay up to date with school news &amp; events.</p>

    <!-- Login prompt (shown when logged out) -->
    <div class="login-prompt" id="loginPrompt">
      <div class="lp-text"><strong>Sign in</strong> to post announcements to your school community.</div>
      <button class="btn-google" onclick="signInWithGoogle()">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2045c0-.638-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9086c1.7018-1.5668 2.6836-3.874 2.6836-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.4673-.8059 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.8591-3.0477.8591-2.3445 0-4.3282-1.5836-5.036-3.7105H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z" fill="#34A853"/><path d="M3.964 10.71C3.7845 10.17 3.6818 9.5945 3.6818 9s.1027-1.17.2822-1.71V4.9582H.9573A8.9961 8.9961 0 000 9c0 1.4523.3477 2.8268.9573 4.0418L3.964 10.71z" fill="#FBBC05"/><path d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4627.8918 11.4259 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9582L3.964 7.29C4.6718 5.1632 6.6555 3.5795 9 3.5795z" fill="#EA4335"/></svg>
        Sign in
      </button>
    </div>

    <!-- New Post Button (shown when logged in) -->
    <button class="btn-new-post" id="btnNewPost" onclick="toggleForm()">
      <span id="newPostBtnIcon">＋</span>
      <span id="newPostBtnText">New Announcement</span>
    </button>

    <!-- Post Form -->
    <div class="post-form-wrap" id="postFormWrap">
      <div class="glass-card">
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Title</label>
            <input class="form-input" id="fTitle" type="text" placeholder="Announcement title…" maxlength="100"/>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Category</label>
            <select class="form-select" id="fCategory">
              <option value="general">General</option>
              <option value="event">Event</option>
              <option value="academic">Academic</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:16px">
          <label class="form-label">Message</label>
          <textarea class="form-textarea" id="fBody" placeholder="Write your announcement here…" maxlength="800"></textarea>
        </div>
        <div style="display:flex; gap:10px; align-items:center">
          <button class="btn-post" onclick="postAnnouncement()">📢 Post Announcement</button>
          <button class="btn-signout" onclick="toggleForm()" style="border-color:var(--glass-border); color:var(--text-dim)">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="filterAnn('all', this)">All</button>
      <button class="filter-btn" onclick="filterAnn('general', this)">General</button>
      <button class="filter-btn" onclick="filterAnn('event', this)">Events</button>
      <button class="filter-btn" onclick="filterAnn('academic', this)">Academic</button>
      <button class="filter-btn" onclick="filterAnn('urgent', this)">Urgent</button>
    </div>

    <!-- Announcements List -->
    <div class="announcements" id="annList"></div>

    <div class="empty-state" id="emptyState" style="display:none">
      <div class="es-icon">📭</div>
      <p>No announcements yet. Be the first to post!</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsFs1qrmojBkuwIynMrFUYmt5NovALDoo",
    authDomain: "pyro-scroll.firebaseapp.com",
    projectId: "pyro-scroll",
    storageBucket: "pyro-scroll.firebasestorage.app",
    messagingSenderId: "422391668810",
    appId: "1:422391668810:web:847b8f56e3aedc8430c6b3",
    measurementId: "G-TW76D61P81"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let currentFilter = 'all';

  // ── AUTH ──
  window.signInWithGoogle = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      showToast("Sign-in failed: " + e.message);
    }
  };

  window.signOut = async () => {
    await fbSignOut(auth);
    showToast("Signed out.");
  };

  onAuthStateChanged(auth, user => {
    currentUser = user;
    const chip = document.getElementById('userChip');
    const avatar = document.getElementById('userAvatar');
    const nameEl = document.getElementById('userName');
    const btnLogin = document.getElementById('btnLogin');
    const btnSignOut = document.getElementById('btnSignOut');
    const loginPrompt = document.getElementById('loginPrompt');
    const btnNewPost = document.getElementById('btnNewPost');
    const postFormWrap = document.getElementById('postFormWrap');
    const subText = document.getElementById('pageSubText');

    if (user) {
      chip.classList.add('visible');
      avatar.src = user.photoURL || '';
      nameEl.textContent = user.displayName?.split(' ')[0] || 'User';
      btnLogin.style.display = 'none';
      btnSignOut.style.display = 'block';
      loginPrompt.style.display = 'none';
      btnNewPost.classList.add('visible');
      subText.textContent = `Welcome back, ${user.displayName?.split(' ')[0]}! You can post announcements.`;
    } else {
      chip.classList.remove('visible');
      btnLogin.style.display = 'flex';
      btnSignOut.style.display = 'none';
      loginPrompt.style.display = 'flex';
      btnNewPost.classList.remove('visible');
      postFormWrap.classList.remove('visible');
      subText.textContent = 'Stay up to date with school news & events.';
    }
  });

  // ── FORM TOGGLE ──
  window.toggleForm = () => {
    const wrap = document.getElementById('postFormWrap');
    const btnText = document.getElementById('newPostBtnText');
    const btnIcon = document.getElementById('newPostBtnIcon');
    const open = wrap.classList.toggle('visible');
    btnText.textContent = open ? 'Cancel' : 'New Announcement';
    btnIcon.textContent = open ? '✕' : '＋';
    if (open) wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  // ── POST ──
  window.postAnnouncement = async () => {
    if (!currentUser) { showToast("Please sign in first."); return; }
    const title = document.getElementById('fTitle').value.trim();
    const body = document.getElementById('fBody').value.trim();
    const category = document.getElementById('fCategory').value;
    if (!title || !body) { showToast("Please fill in title and message."); return; }

    try {
      await addDoc(collection(db, "announcements"), {
        title, body, category,
        authorName: currentUser.displayName || 'Anonymous',
        authorPhoto: currentUser.photoURL || '',
        authorId: currentUser.uid,
        createdAt: serverTimestamp()
      });
      document.getElementById('fTitle').value = '';
      document.getElementById('fBody').value = '';
      document.getElementById('fCategory').value = 'general';
      window.toggleForm();
      showToast("📢 Announcement posted!");
    } catch (e) {
      showToast("Error posting: " + e.message);
    }
  };

  // ── DELETE ──
  window.deleteAnnouncement = async (id, authorId) => {
    if (!currentUser || currentUser.uid !== authorId) {
      showToast("You can only delete your own posts."); return;
    }
    if (!confirm("Delete this announcement?")) return;
    await deleteDoc(doc(db, "announcements", id));
    showToast("Announcement deleted.");
  };

  // ── FILTER ──
  window.filterAnn = (cat, btn) => {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFiltered();
  };

  let allAnnouncements = [];
  const renderFiltered = () => {
    const list = currentFilter === 'all'
      ? allAnnouncements
      : allAnnouncements.filter(a => a.category === currentFilter);
    renderList(list);
  };

  const renderList = (items) => {
    const container = document.getElementById('annList');
    const empty = document.getElementById('emptyState');
    container.innerHTML = '';
    if (!items.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    items.forEach((ann, i) => {
      const card = document.createElement('div');
      card.className = 'ann-card';
      card.dataset.cat = ann.category;
      card.style.animationDelay = `${i * 0.05}s`;

      const date = ann.createdAt?.toDate
        ? ann.createdAt.toDate().toLocaleDateString('en-IE', { day:'numeric', month:'short', year:'numeric' })
        : 'Just now';

      const isOwner = currentUser && currentUser.uid === ann.authorId;
      const deleteBtn = isOwner
        ? `<button class="ann-delete" onclick="deleteAnnouncement('${ann.id}','${ann.authorId}')">✕ Delete</button>`
        : '';

      const photo = ann.authorPhoto
        ? `<img src="${ann.authorPhoto}" alt="${ann.authorName}"/>`
        : '';

      card.innerHTML = `
        <div class="ann-top">
          <span class="ann-title">${escHtml(ann.title)}</span>
          <span class="ann-tag tag-${ann.category}">${ann.category}</span>
        </div>
        <p class="ann-body">${escHtml(ann.body)}</p>
        <div class="ann-meta">
          <span class="ann-meta-author">${photo}${escHtml(ann.authorName)}</span>
          <span>·</span>
          <span>${date}</span>
          ${deleteBtn}
        </div>`;
      container.appendChild(card);
    });
  };

  // ── REALTIME LISTENER ──
  const q = query(collection(db, "announcements"), orderBy("createdAt", "desc"));
  onSnapshot(q, snap => {
    allAnnouncements = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFiltered();
  });

  // ── HELPERS ──
  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  };

  const escHtml = str =>
    str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
</script>
</body>
</html>
